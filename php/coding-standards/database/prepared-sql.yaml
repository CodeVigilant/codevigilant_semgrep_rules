rules:
  # ============================================================================
  # PREPARED SQL RULES
  # Source: WordPress-Coding-Standards/WordPress/Sniffs/DB/PreparedSQLSniff.php
  # Source: WordPress-Coding-Standards/WordPress/Sniffs/DB/PreparedSQLPlaceholdersSniff.php
  # License: MIT - Copyright (c) 2009 John Godley and contributors
  # ============================================================================

  - id: codevigilant.php.coding-standards.sqli.unprepared_query
    message: "Use $wpdb->prepare() for SQL queries containing variables. Direct variable interpolation can lead to SQL injection."
    severity: ERROR
    languages: [php]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $_GET[...]
              - pattern: $_POST[...]
              - pattern: $_REQUEST[...]
              - pattern: $_COOKIE[...]
              - pattern: $...VAR
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $wpdb->query(...)
              - pattern: $wpdb->get_results(...)
              - pattern: $wpdb->get_var(...)
              - pattern: $wpdb->get_row(...)
              - pattern: $wpdb->get_col(...)
              - pattern: $wpdb->prepare(...)
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: $wpdb->prepare(...)
              - pattern: esc_sql(...)
              - pattern: intval(...)
              - pattern: absint(...)
              - pattern: floatval(...)
              - pattern: like_escape(...)
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/prepare/
        - https://github.com/WordPress/WordPress-Coding-Standards/blob/develop/WordPress/Sniffs/DB/PreparedSQLSniff.php
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.sqli.interpolated_variable
    message: "Interpolated variable in SQL query detected. Use $wpdb->prepare() with placeholders instead."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: $wpdb->query("... {$...VAR} ...")
          - pattern: $wpdb->query("... $...VAR ...")
          - pattern: $wpdb->get_results("... {$...VAR} ...")
          - pattern: $wpdb->get_results("... $...VAR ...")
          - pattern: $wpdb->get_var("... {$...VAR} ...")
          - pattern: $wpdb->get_var("... $...VAR ...")
          - pattern: $wpdb->get_row("... {$...VAR} ...")
          - pattern: $wpdb->get_row("... $...VAR ...")
    metadata:
      category: security
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/prepare/
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.sqli.concatenated_query
    message: "Concatenated variable in SQL query detected. Use $wpdb->prepare() with placeholders instead."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: $wpdb->query("..." . $...VAR . "...")
          - pattern: $wpdb->get_results("..." . $...VAR . "...")
          - pattern: $wpdb->get_var("..." . $...VAR . "...")
          - pattern: $wpdb->get_row("..." . $...VAR . "...")
          - pattern: $wpdb->query('...' . $...VAR . '...')
          - pattern: $wpdb->get_results('...' . $...VAR . '...')
    metadata:
      category: security
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/prepare/
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.sqli.placeholder_mismatch
    message: "Possible placeholder mismatch in $wpdb->prepare(). Use %s for strings, %d for integers, %f for floats, and %i for identifiers."
    severity: WARNING
    languages: [php]
    patterns:
      - pattern: $wpdb->prepare("... %s ...", intval(...))
      - pattern: $wpdb->prepare("... %d ...", esc_sql(...))
    metadata:
      category: security
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/prepare/
        - https://github.com/WordPress/WordPress-Coding-Standards/blob/develop/WordPress/Sniffs/DB/PreparedSQLPlaceholdersSniff.php
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.sqli.direct_db_query
    message: "Direct database query detected. Consider using WordPress core functions instead which handle caching and sanitation."
    severity: WARNING
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: $wpdb->query(...)
          - pattern: $wpdb->get_results(...)
    pattern-sanitize:
      - pattern: $wpdb->prepare(...)
    metadata:
      category: security
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: LOW
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/
        - https://github.com/WordPress/WordPress-Coding-Standards/blob/develop/WordPress/Sniffs/DB/DirectDatabaseQuerySniff.php
      source: WordPress-Coding-Standards
      license: MIT
