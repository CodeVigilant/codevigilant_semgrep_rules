rules:
  # ============================================================================
  # OUTPUT ESCAPING RULES (XSS Prevention)
  # Source: WordPress-Coding-Standards/WordPress/Sniffs/Security/EscapeOutputSniff.php
  # License: MIT - Copyright (c) 2009 John Godley and contributors
  # ============================================================================

  - id: codevigilant.php.coding-standards.xss.echo.unescaped
    message: "All output should be run through an escaping function. Found unescaped variable in echo statement."
    severity: ERROR
    languages: [php]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $_GET[...]
              - pattern: $_POST[...]
              - pattern: $_REQUEST[...]
              - pattern: $_COOKIE[...]
              - pattern: $_SERVER[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: echo $...VAR;
              - pattern: print $...VAR;
              - pattern: printf($...VAR, ...);
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: esc_html(...)
              - pattern: esc_attr(...)
              - pattern: esc_url(...)
              - pattern: esc_url_raw(...)
              - pattern: esc_js(...)
              - pattern: esc_textarea(...)
              - pattern: htmlspecialchars(...)
              - pattern: htmlentities(...)
              - pattern: wp_kses(...)
              - pattern: wp_kses_post(...)
              - pattern: sanitize_text_field(...)
              - pattern: sanitize_key(...)
              - pattern: intval(...)
              - pattern: absint(...)
    metadata:
      category: security
      cwe: "CWE-79: Improper Neutralization of Input During Web Page Generation (Cross-site Scripting)"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
        - https://github.com/WordPress/WordPress-Coding-Standards/blob/develop/WordPress/Sniffs/Security/EscapeOutputSniff.php
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.xss.unsafe_printing._e
    message: "All output should be run through an escaping function. Use esc_html_e() or esc_attr_e() instead of _e()."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern: _e($TEXT, ...)
      - pattern-not: _e("...", ...)
      - pattern-not: _e('...', ...)
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.xss.unsafe_printing._ex
    message: "All output should be run through an escaping function. Use esc_html_x() or esc_attr_x() instead of _ex()."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern: _ex($TEXT, ..., ...)
      - pattern-not: _ex("...", ..., ...)
      - pattern-not: _ex('...', ..., ...)
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.xss.exit.unescaped
    message: "All output should be run through an escaping function. Found unescaped variable in exit/die statement."
    severity: ERROR
    languages: [php]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $_GET[...]
              - pattern: $_POST[...]
              - pattern: $_REQUEST[...]
              - pattern: $_COOKIE[...]
              - pattern: $_SERVER[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: exit($VAR);
              - pattern: die($VAR);
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: esc_html(...)
              - pattern: esc_attr(...)
              - pattern: esc_url(...)
              - pattern: htmlspecialchars(...)
              - pattern: htmlentities(...)
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
      source: WordPress-Coding-Standards
      license: MIT
