rules:
  - id: codevigilant.php.coding-standards.hardcoded_credentials.password_assignment
    patterns:
      - pattern-either:
        - pattern: $password = "...";
        - pattern: $passwd = "...";
        - pattern: $pass = "...";
        - pattern: $pwd = "...";
        - pattern: $secret = "...";
        - pattern: $api_key = "...";
        - pattern: $apikey = "...";
        - pattern: $api_secret = "...";
        - pattern: $auth_token = "...";
        - pattern: $access_token = "...";
      - pattern-not: $password = "";
      - pattern-not: $passwd = "";
      - pattern-not: $pass = "";
      - pattern-not: $pwd = "";
      - pattern-not: $secret = "";
      - pattern-not: $api_key = "";
      - pattern-not: $apikey = "";
      - pattern-not: $api_secret = "";
      - pattern-not: $auth_token = "";
      - pattern-not: $access_token = "";
    message: |
      Detected hard-coded credentials in source code.
      Sensitive values like passwords, API keys, and tokens should not be stored in source code.
      Use environment variables, WordPress constants in wp-config.php, or a secrets management system.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
        - https://developer.wordpress.org/apis/security/
    languages: [php]
    mode: search
    severity: HIGH

  - id: codevigilant.php.coding-standards.hardcoded_credentials.define_password
    patterns:
      - pattern-either:
        - pattern: define('DB_PASSWORD', "...");
        - pattern: define('DB_PASSWORD', '...');
        - pattern: define('AUTH_KEY', '...');
        - pattern: define('SECURE_AUTH_KEY', '...');
        - pattern: define('LOGGED_IN_KEY', '...');
        - pattern: define('NONCE_KEY', '...');
        - pattern: define('AUTH_SALT', '...');
        - pattern: define('SECURE_AUTH_SALT', '...');
        - pattern: define('LOGGED_IN_SALT', '...');
        - pattern: define('NONCE_SALT', '...');
      - pattern-not: define('DB_PASSWORD', '');
      - pattern-not: define('DB_PASSWORD', "");
    message: |
      Detected hard-coded WordPress credentials or security keys in source code.
      Database passwords and authentication keys should use environment variables.
      Example: define('DB_PASSWORD', getenv('DB_PASSWORD'));
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
        - https://developer.wordpress.org/apis/security/
    languages: [php]
    mode: search
    severity: HIGH
