rules:
  # ============================================================================
  # INPUT VALIDATION RULES
  # Source: WordPress-Coding-Standards/WordPress/Sniffs/Security/ValidatedSanitizedInputSniff.php
  # License: MIT - Copyright (c) 2009 John Godley and contributors
  # ============================================================================

  - id: codevigilant.php.coding-standards.validation.superglobal.not_validated
    message: "Detected usage of a possibly undefined superglobal array index. Check that the array index exists before using it (use isset() or empty())."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: $_GET[$KEY]
          - pattern: $_POST[$KEY]
          - pattern: $_REQUEST[$KEY]
          - pattern: $_COOKIE[$KEY]
      # Exclude when inside isset/empty wrappers (expression-level)
      - pattern-not-inside: isset(...)
      - pattern-not-inside: empty(...)
      - pattern-not-inside: '!empty(...)'
      - pattern-not-inside: '!isset(...)'
      # Exclude when inside any expression containing isset/empty (short-circuit, ternary, etc.)
      - pattern-not-inside: <... isset(...) ...>
      - pattern-not-inside: <... empty(...) ...>
      # Exclude when inside if condition or body containing isset/empty
      - pattern-not-inside: |
          if (<... isset(...) ...>) { ... }
      - pattern-not-inside: |
          if (<... empty(...) ...>) { ... }
      - pattern-not-inside: |
          if (<... !empty(...) ...>) { ... }
      - pattern-not-inside: |
          if (<... !isset(...) ...>) { ... }
      # Exclude guard clause patterns (early return if not set)
      - pattern-not-inside: |
          function $FUNC(...) {
            ...
            if (!isset(...)) { return; }
            ...
          }
      - pattern-not-inside: |
          function $FUNC(...) {
            ...
            if (!isset(...)) { return false; }
            ...
          }
      - pattern-not-inside: |
          function $FUNC(...) {
            ...
            if (empty(...)) { return; }
            ...
          }
      - pattern-not-inside: |
          function $FUNC(...) {
            ...
            if (empty(...)) { return false; }
            ...
          }
      # Exclude null coalescing (validates existence)
      - pattern-not-regex: '\$_(GET|POST|REQUEST|COOKIE)\[[^\]]+\]\s*\?\?'
      # Exclude writes to superglobals (assignments TO, not reads FROM)
      - pattern-not-regex: '\$_(GET|POST|REQUEST|COOKIE)\[[^\]]+\]\s*='
      # Exclude when wrapped in sanitization/validation functions
      - pattern-not-inside: sanitize_text_field(...)
      - pattern-not-inside: sanitize_key(...)
      - pattern-not-inside: sanitize_email(...)
      - pattern-not-inside: sanitize_url(...)
      - pattern-not-inside: sanitize_title(...)
      - pattern-not-inside: sanitize_file_name(...)
      - pattern-not-inside: sanitize_mime_type(...)
      - pattern-not-inside: absint(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: floatval(...)
      - pattern-not-inside: wp_unslash(...)
      - pattern-not-inside: wp_verify_nonce(...)
      - pattern-not-inside: filter_var(...)
      - pattern-not-inside: filter_input(...)
      - pattern-not-inside: is_array(...)
      - pattern-not-inside: in_array(...)
      - pattern-not-inside: array_key_exists(...)
      - pattern-not-inside: htmlspecialchars(...)
      - pattern-not-inside: htmlentities(...)
      - pattern-not-inside: json_decode(...)
      - pattern-not-inside: array_map(...)
    metadata:
      category: security
      cwe: "CWE-129: Improper Validation of Array Index"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
        - https://github.com/WordPress/WordPress-Coding-Standards/blob/develop/WordPress/Sniffs/Security/ValidatedSanitizedInputSniff.php
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.validation.superglobal.not_sanitized
    message: "Detected usage of a non-sanitized input variable. Sanitize input before use."
    severity: ERROR
    languages: [php]
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $_GET[...]
              - pattern: $_POST[...]
              - pattern: $_REQUEST[...]
              - pattern: $_COOKIE[...]
              - pattern: $_SERVER[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $wpdb->query($...VAR)
              - pattern: $wpdb->get_results($...VAR)
              - pattern: $wpdb->get_var($...VAR)
              - pattern: $wpdb->get_row($...VAR)
              - pattern: $wpdb->get_col($...VAR)
              - pattern: $wpdb->prepare($...VAR, ...)
              - pattern: echo $...VAR;
              - pattern: print $...VAR;
              - pattern: include $...VAR;
              - pattern: require $...VAR;
              - pattern: file_get_contents($...VAR)
              - pattern: shell_exec($...VAR)
              - pattern: exec($...VAR)
              - pattern: system($...VAR)
              - pattern: eval($...VAR)
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: sanitize_text_field(...)
              - pattern: sanitize_email(...)
              - pattern: sanitize_url(...)
              - pattern: sanitize_key(...)
              - pattern: sanitize_title(...)
              - pattern: sanitize_file_name(...)
              - pattern: intval(...)
              - pattern: absint(...)
              - pattern: floatval(...)
              - pattern: esc_sql(...)
              - pattern: wp_unslash(...)
              - pattern: stripslashes(...)
              - pattern: htmlspecialchars(...)
              - pattern: htmlentities(...)
    metadata:
      category: security
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
      source: WordPress-Coding-Standards
      license: MIT

  - id: codevigilant.php.coding-standards.validation.superglobal.not_unslashed
    message: "Superglobal not unslashed before sanitization. WordPress automatically slashes $_GET, $_POST, $_COOKIE, and $_REQUEST values. Use wp_unslash() before sanitization."
    severity: WARNING
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: sanitize_text_field($_GET[$...KEY])
          - pattern: sanitize_text_field($_POST[$...KEY])
          - pattern: sanitize_text_field($_REQUEST[$...KEY])
          - pattern: sanitize_text_field($_COOKIE[$...KEY])
          - pattern: sanitize_email($_GET[$...KEY])
          - pattern: sanitize_email($_POST[$...KEY])
          - pattern: sanitize_url($_GET[$...KEY])
          - pattern: sanitize_url($_POST[$...KEY])
    metadata:
      category: security
      cwe: "CWE-20"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/reference/functions/wp_unslash/
      source: WordPress-Coding-Standards
      license: MIT
