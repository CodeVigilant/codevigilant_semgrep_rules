rules:
  # ============================================================================
  # STRIP_TAGS RULES
  # Source: VIP-Coding-Standards/WordPressVIPMinimum/Sniffs/Functions/StripTagsSniff.php
  # License: GPL-2.0-or-later - Copyright Automattic Inc, 2016
  # ============================================================================

  - id: codevigilant.php.coding-standards.xss.strip_tags_inadequate
    message: "strip_tags() is not a safe escaping function. Use wp_kses() or esc_html() instead to prevent XSS."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: echo strip_tags($...VAR);
          - pattern: print strip_tags($...VAR);
          - pattern: return strip_tags($...VAR);
          - pattern: $...VAR = strip_tags($...INPUT);
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://docs.wpvip.com/technical-references/code-review/vip-errors/
        - https://github.com/Automattic/VIP-Coding-Standards/blob/develop/WordPressVIPMinimum/Sniffs/Functions/StripTagsSniff.php
      source: VIP-Coding-Standards
      license: GPL-2.0-or-later

  - id: codevigilant.php.coding-standards.xss.strip_tags_user_input
    message: "Using strip_tags() on user input is not sufficient for XSS prevention. Use wp_kses() with allowed tags or esc_html()."
    severity: ERROR
    languages: [php]
    patterns:
      - pattern-either:
          - pattern: strip_tags($_GET[...])
          - pattern: strip_tags($_POST[...])
          - pattern: strip_tags($_REQUEST[...])
          - pattern: strip_tags($_COOKIE[...])
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://docs.wpvip.com/technical-references/code-review/vip-errors/
      source: VIP-Coding-Standards
      license: GPL-2.0-or-later
