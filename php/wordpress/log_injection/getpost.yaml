rules:
  # Direct taint patterns - user input directly in logging functions
  - id: codevigilant.php.wordpress.log_injection.getpost.error_log.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
        - pattern: $_SERVER[$KEY]
      - pattern-inside: error_log($X, ...);
      - pattern-not-inside: sanitize_text_field(...)
      - pattern-not-inside: sanitize_textarea_field(...)
      - pattern-not-inside: esc_html(...)
      - pattern-not-inside: wp_strip_all_tags(...)
      - pattern-not-inside: strip_tags(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: absint(...)
    message: |
      Detected log injection vulnerability in WordPress.
      User input from superglobals is directly used in error_log() without sanitization.
      An attacker could inject newlines to forge log entries or corrupt log files.
      Use sanitize_text_field() to strip newlines and tags from the input before logging.
    metadata:
      category: security
      cwe: "CWE-117: Improper Output Neutralization for Logs"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Log_Injection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: MEDIUM

  - id: codevigilant.php.wordpress.log_injection.getpost.syslog.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
        - pattern: $_SERVER[$KEY]
      - pattern-inside: syslog($PRIORITY, $X);
      - pattern-not-inside: sanitize_text_field(...)
      - pattern-not-inside: sanitize_textarea_field(...)
      - pattern-not-inside: esc_html(...)
      - pattern-not-inside: wp_strip_all_tags(...)
      - pattern-not-inside: strip_tags(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: absint(...)
    message: |
      Detected log injection vulnerability in WordPress.
      User input from superglobals is directly used in syslog() without sanitization.
      An attacker could inject newlines to forge log entries.
      Use sanitize_text_field() to strip newlines and tags from the input before logging.
    metadata:
      category: security
      cwe: "CWE-117: Improper Output Neutralization for Logs"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Log_Injection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: MEDIUM

  # Deep taint patterns
  - id: codevigilant.php.wordpress.log_injection.getpost.error_log.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            error_log(<... $V ...>, ...);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            error_log(<... $V ...>, ...);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            error_log(<... $V ...>, ...);
        - pattern: |
            $V = $_SERVER[$KEY];
            ...
            error_log(<... $V ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          error_log(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          error_log(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          error_log(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_SERVER[$KEY];
          ...
          error_log(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          error_log(<... sanitize_textarea_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          error_log(<... sanitize_textarea_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          error_log(<... sanitize_textarea_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_SERVER[$KEY];
          ...
          error_log(<... sanitize_textarea_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          error_log(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          error_log(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          error_log(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_SERVER[$KEY];
          ...
          error_log(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          error_log(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          error_log(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          error_log(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_SERVER[$KEY];
          ...
          error_log(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          error_log(<... strip_tags($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          error_log(<... strip_tags($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          error_log(<... strip_tags($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_SERVER[$KEY];
          ...
          error_log(<... strip_tags($V) ...>, ...);
    message: |
      Detected log injection vulnerability in WordPress.
      User input from superglobals is assigned to a variable and later used in error_log() without sanitization.
      An attacker could inject newlines to forge log entries or corrupt log files.
      Use sanitize_text_field() to strip newlines and tags from the input before logging.
    metadata:
      category: security
      cwe: "CWE-117: Improper Output Neutralization for Logs"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/attacks/Log_Injection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: MEDIUM
