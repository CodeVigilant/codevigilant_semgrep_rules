  # Deep taint patterns - variable assignment before command execution
  - id: codevigilant.php.wordpress.command_injection.getpost.exec.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            exec(<... $V ...>, ...);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            exec(<... $V ...>, ...);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            exec(<... $V ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          exec(<... escapeshellarg($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          exec(<... escapeshellarg($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          exec(<... escapeshellarg($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          exec(<... escapeshellcmd($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          exec(<... escapeshellcmd($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          exec(<... escapeshellcmd($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          exec(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          exec(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          exec(<... intval($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          exec(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          exec(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          exec(<... absint($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          exec(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          exec(<... sanitize_text_field($V) ...>, ...);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          exec(<... sanitize_text_field($V) ...>, ...);
    message: |
      Detected command injection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is assigned to a variable and later used in exec() without sanitization.
      Use escapeshellarg() to escape individual arguments or avoid shell commands entirely.
    metadata:
      category: security
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command ('Command Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/attacks/Command_Injection
        - https://www.php.net/manual/en/function.escapeshellarg.php
    languages: [php]
    mode: search
    severity: CRITICAL

