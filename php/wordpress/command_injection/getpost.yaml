rules:
  # Direct taint patterns - user input directly in command execution functions
  - id: codevigilant.php.wordpress.command_injection.getpost.exec.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: exec($X, ...);
      - pattern-not-inside: escapeshellarg(...)
      - pattern-not-inside: escapeshellcmd(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: absint(...)
      - pattern-not-inside: sanitize_text_field(...)
      - pattern-not-inside: sanitize_key(...)
    message: |
      Detected command injection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is directly used in exec() without sanitization.
      Use escapeshellarg() to escape individual arguments or avoid shell commands entirely.
    metadata:
      category: security
      cwe: "CWE-77: Improper Neutralization of Special Elements used in a Command ('Command Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Command_Injection
        - https://www.php.net/manual/en/function.escapeshellarg.php
    languages: [php]
    mode: search
    severity: CRITICAL

