  # Deep taint patterns - variable assignment before SQL usage
  - id: codevigilant.php.wordpress.sqli.user_agent.get_row.deep_taint
    patterns:
      - pattern: |
          $V = $_SERVER['HTTP_USER_AGENT'];
          ...
          $wpdb->get_row(<... $V ...>);
      - pattern-not-inside: |
          $V = $_SERVER['HTTP_USER_AGENT'];
          ...
          $wpdb->get_row(<... (int) $V ...>);
      - pattern-not-inside: |
          $V = $_SERVER['HTTP_USER_AGENT'];
          ...
          $wpdb->get_row(<... intval($V) ...>);
      - pattern-not-inside: |
          $V = $_SERVER['HTTP_USER_AGENT'];
          ...
          $wpdb->get_row(<... sprintf($V) ...>);
      - pattern-not-inside: |
          $V = $_SERVER['HTTP_USER_AGENT'];
          ...
          $wpdb->get_row(<... esc_sql($V) ...>);
    message: |
      Detected SQL injection vulnerability in WordPress.
      The User-Agent header is assigned to a variable and later used in $wpdb->get_row() without sanitization.
      User-Agent headers can be easily manipulated by attackers. Use $wpdb->prepare() or esc_sql() to properly sanitize.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
