  # Variable substitution patterns - user input assigned to variable then used in SQL
  - id: codevigilant.php.wordpress.sqli.getpost.get_row.taint
    patterns:
      - pattern-either:
        - pattern: |
            $wpdb->get_row(<... $_GET[$KEY] ...>)
        - pattern: |
            $wpdb->get_row(<... $_POST[$KEY] ...>)
      - pattern-not: |
          $wpdb->get_row(<... (int) $_POST[$KEY] ...>)
      - pattern-not: |
          $wpdb->get_row(<... intval($_POST[$KEY]) ...>)
      - pattern-not: |
          $wpdb->get_row(<... sprintf($_POST[$KEY]) ...>)
      - pattern-not: |
          $wpdb->get_row(<... esc_sql($_POST[$KEY]) ...>)
      - pattern-not: |
          $wpdb->get_row(<... (int) $_GET[$KEY] ...>)
      - pattern-not: |
          $wpdb->get_row(<... intval($_GET[$KEY]) ...>)
      - pattern-not: |
          $wpdb->get_row(<... sprintf($_GET[$KEY]) ...>)
      - pattern-not: |
          $wpdb->get_row(<... esc_sql($_GET[$KEY]) ...>)
    message: |
      Detected SQL injection vulnerability in WordPress.
      User input from $_GET or $_POST flows into $wpdb->get_row() without sanitization.
      Use $wpdb->prepare() or esc_sql() to properly sanitize user input.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
