  # Deep taint patterns - variable assignment before SQL usage
  - id: codevigilant.php.wordpress.sqli.getpost.get_row.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            $wpdb->get_row(<... $V ...>);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            $wpdb->get_row(<... $V ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          $wpdb->get_row($wpdb->prepare(...));
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          $wpdb->get_row($wpdb->prepare(...));
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          $wpdb->get_row(<... (int) $V ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          $wpdb->get_row(<... intval($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          $wpdb->get_row(<... (int) $V ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          $wpdb->get_row(<... intval($V) ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          $wpdb->get_row(<... sprintf($V) ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          $wpdb->get_row(<... esc_sql($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          $wpdb->get_row(<... sprintf($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          $wpdb->get_row(<... esc_sql($V) ...>);
    message: |
      Detected SQL injection vulnerability in WordPress.
      User input from $_GET or $_POST is assigned to a variable and later used in $wpdb->get_row() without sanitization.
      Use $wpdb->prepare() or esc_sql() to properly sanitize user input.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/#protect-queries-against-sql-injection-attacks
    languages: [php]
    mode: search
    severity: HIGH

