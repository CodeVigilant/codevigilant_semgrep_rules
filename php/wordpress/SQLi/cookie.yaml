rules:
  # Direct taint patterns - cookie input directly in SQL methods
  - id: codevigilant.php.wordpress.sqli.cookie.get_results.direct
    patterns:
      - pattern: $_COOKIE[$KEY]
      - pattern-inside: $wpdb->get_results($X);
      - pattern-not-inside: $wpdb->prepare(...)
      - pattern-not-inside: $wpdb->escape(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: sprintf(...)
      - pattern-not-inside: esc_sql(...)
      - pattern-not-inside: rawurlencode(...)
    message: |
      Detected SQL injection vulnerability in WordPress.
      User input from $_COOKIE is directly used in $wpdb->get_results() without sanitization.
      Use $wpdb->prepare() to properly escape the query. Cookie data should be treated as untrusted.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/reference/classes/wpdb/#protect-queries-against-sql-injection-attacks
    languages: [php]
    mode: search
    severity: HIGH

