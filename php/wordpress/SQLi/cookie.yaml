  # Deep taint patterns - variable assignment before SQL usage
  - id: codevigilant.php.wordpress.sqli.cookie.get_row.deep_taint
    patterns:
      - pattern: |
          $V = $_COOKIE[$KEY];
          ...
          $wpdb->get_row(<... $V ...>);
      - pattern-not-inside: |
          $V = $_COOKIE[$KEY];
          ...
          $wpdb->get_row(<... (int) $V ...>);
      - pattern-not-inside: |
          $V = $_COOKIE[$KEY];
          ...
          $wpdb->get_row(<... intval($V) ...>);
      - pattern-not-inside: |
          $V = $_COOKIE[$KEY];
          ...
          $wpdb->get_row(<... sprintf($V) ...>);
      - pattern-not-inside: |
          $V = $_COOKIE[$KEY];
          ...
          $wpdb->get_row(<... esc_sql($V) ...>);
    message: |
      Detected SQL injection vulnerability in WordPress.
      User input from $_COOKIE is assigned to a variable and later used in $wpdb->get_row() without sanitization.
      Use $wpdb->prepare() or esc_sql() to properly sanitize user input. Cookie data should be treated as untrusted.
    metadata:
      category: security
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
