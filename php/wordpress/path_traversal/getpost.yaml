rules:
  # Direct taint patterns - user input directly in file operation functions
  - id: codevigilant.php.wordpress.path_traversal.getpost.file_get_contents.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: file_get_contents($X);
      - pattern-not-inside: realpath(...)
      - pattern-not-inside: basename(...)
      - pattern-not-inside: wp_normalize_path(...)
      - pattern-not-inside: sanitize_file_name(...)
      - pattern-not-inside: validate_file(...)
      - pattern-not-inside: validate_file_to_edit(...)
      - pattern-not-inside: sanitize_text_field(...)
      - pattern-not-inside: intval(...)
      - pattern-not-inside: absint(...)
    message: |
      Detected path traversal vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is directly used in file_get_contents() without path validation.
      Use basename() or realpath() to prevent directory traversal attacks.
    metadata:
      category: security
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      owasp: "A01:2021 - Broken Access Control"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Path_Traversal
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: HIGH

