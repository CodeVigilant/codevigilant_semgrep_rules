          file_get_contents(<... absint($V) ...>);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          file_get_contents(<... absint($V) ...>);
    message: |
      Detected path traversal vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is assigned to a variable and later used in file_get_contents() without path validation.
      Use basename() or realpath() to prevent directory traversal attacks.
    metadata:
      category: security
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      owasp: "A01:2021 - Broken Access Control"
      technology: wordpress
