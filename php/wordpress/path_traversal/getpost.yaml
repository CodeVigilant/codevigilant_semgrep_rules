  # Deep taint patterns - variable assignment before file operation
  - id: codevigilant.php.wordpress.path_traversal.getpost.file_get_contents.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            file_get_contents(<... $V ...>);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            file_get_contents(<... $V ...>);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            file_get_contents(<... $V ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          file_get_contents(<... realpath($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          file_get_contents(<... realpath($V) ...>);
      - pattern-not-inside: |
