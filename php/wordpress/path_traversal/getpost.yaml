          ...
          file_get_contents(<... basename($V) ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          file_get_contents(<... sanitize_file_name($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
          file_get_contents(<... sanitize_file_name($V) ...>);
      - pattern-not-inside: |
          $V = $_REQUEST[$KEY];
          ...
          file_get_contents(<... sanitize_file_name($V) ...>);
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          file_get_contents(<... validate_file($V) ...>);
      - pattern-not-inside: |
          $V = $_POST[$KEY];
          ...
