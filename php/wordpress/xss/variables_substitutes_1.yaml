rules:
  - id: codevigilant.php.wordpress.xss.getpost.variable.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            echo <... $V ...>;
        - pattern: |
            $V = $_POST[$KEY];
            ...
            echo <... $V ...>;
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          echo <... (int) $V ...>;
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          echo <... esc_js($V) ...>;
      - pattern-not-inside: |
          $V = $_GET[$KEY];
          ...
          echo <... intval($V) ...>;
