rules:
  - id: codevigilant.php.wordpress.xss.add_query_arg.echo
    patterns:
      - pattern-either:
        - pattern: |
            $V = home_url(add_query_arg($A, $B));
            ...
            echo <... $V ...>;
        - pattern: |
            $V = add_query_arg($A, $B);
            ...
            echo <... $V ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... esc_url($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... esc_url($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... esc_html($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... esc_html($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... esc_attr($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... esc_attr($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... wp_kses_post($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... wp_kses_post($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... wp_kses($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... wp_kses($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... esc_url_raw($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
