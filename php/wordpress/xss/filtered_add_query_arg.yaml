      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... wp_strip_all_tags($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... wp_strip_all_tags($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... htmlspecialchars($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... htmlspecialchars($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... htmlentities($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... htmlentities($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... esc_js($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... esc_js($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... strip_tags($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... strip_tags($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... empty($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... empty($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... isset($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... isset($V) ...>;
      - pattern-not-inside: |
          $V = add_query_arg($A, $B);
          ...
          echo <... sanitize_key($V) ...>;
      - pattern-not-inside: |
          $V = home_url(add_query_arg($A, $B));
          ...
          echo <... sprintf($V) ...>;
    message: |
      Detected XSS vulnerability in WordPress.
      URL generated with add_query_arg() is echoed without proper sanitization.
      Use esc_url() to properly escape URLs before output.
    metadata:
      category: security
      cwe: "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: HIGH
