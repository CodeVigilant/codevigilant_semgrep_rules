rules:
  # Direct taint - user input used to dynamically call functions or instantiate classes
  - id: codevigilant.php.wordpress.unsafe_reflection.getpost.call_user_func.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: call_user_func($X, ...);
    message: |
      Detected unsafe reflection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is directly used in call_user_func() to dynamically call a function.
      An attacker could invoke arbitrary functions. Use a whitelist of allowed function names instead.
    metadata:
      category: security
      cwe: "CWE-470: Use of Externally-Controlled Input to Select Classes or Code ('Unsafe Reflection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/vulnerabilities/Unsafe_use_of_Reflection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: CRITICAL

  - id: codevigilant.php.wordpress.unsafe_reflection.getpost.call_user_func_array.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: call_user_func_array($X, ...);
    message: |
      Detected unsafe reflection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is directly used in call_user_func_array() to dynamically call a function.
      An attacker could invoke arbitrary functions. Use a whitelist of allowed function names instead.
    metadata:
      category: security
      cwe: "CWE-470: Use of Externally-Controlled Input to Select Classes or Code ('Unsafe Reflection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: HIGH
      references:
        - https://owasp.org/www-community/vulnerabilities/Unsafe_use_of_Reflection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: CRITICAL

  # Deep taint - variable assignment then dynamic call
  - id: codevigilant.php.wordpress.unsafe_reflection.getpost.call_user_func.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            call_user_func($V, ...);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            call_user_func($V, ...);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            call_user_func($V, ...);
    message: |
      Detected unsafe reflection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is assigned to a variable and later used in call_user_func() to dynamically call a function.
      An attacker could invoke arbitrary functions. Use a whitelist of allowed function names instead.
    metadata:
      category: security
      cwe: "CWE-470: Use of Externally-Controlled Input to Select Classes or Code ('Unsafe Reflection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/vulnerabilities/Unsafe_use_of_Reflection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: CRITICAL

  - id: codevigilant.php.wordpress.unsafe_reflection.getpost.dynamic_instantiation.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            new $V(...);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            new $V(...);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            new $V(...);
    message: |
      Detected unsafe reflection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is assigned to a variable and later used to dynamically instantiate a class.
      An attacker could instantiate arbitrary classes. Use a whitelist of allowed class names instead.
    metadata:
      category: security
      cwe: "CWE-470: Use of Externally-Controlled Input to Select Classes or Code ('Unsafe Reflection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/vulnerabilities/Unsafe_use_of_Reflection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: CRITICAL

  - id: codevigilant.php.wordpress.unsafe_reflection.getpost.dynamic_call.deep_taint
    patterns:
      - pattern-either:
        - pattern: |
            $V = $_GET[$KEY];
            ...
            $V(...);
        - pattern: |
            $V = $_POST[$KEY];
            ...
            $V(...);
        - pattern: |
            $V = $_REQUEST[$KEY];
            ...
            $V(...);
    message: |
      Detected unsafe reflection vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is assigned to a variable and later used as a dynamic function call.
      An attacker could invoke arbitrary functions. Use a whitelist of allowed function names instead.
    metadata:
      category: security
      cwe: "CWE-470: Use of Externally-Controlled Input to Select Classes or Code ('Unsafe Reflection')"
      owasp: "A03:2021 - Injection"
      technology: wordpress
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/vulnerabilities/Unsafe_use_of_Reflection
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: CRITICAL
