rules:
- id: ssrf-key-inside-file_get_contents
  patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: file_get_contents($X);
  languages: [php]
  mode: search
  message: SSRF where $X in file_get_content. No filters. No multiple lines.
  severity: INFO
