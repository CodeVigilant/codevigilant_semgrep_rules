rules:
  - id: codevigilant.php.wordpress.ssrf.getpost.file_get_contents.direct
    patterns:
      - pattern-either:
        - pattern: $_GET[$KEY]
        - pattern: $_POST[$KEY]
        - pattern: $_REQUEST[$KEY]
      - pattern-inside: file_get_contents($X);
      - pattern-not-inside: esc_url(...)
      - pattern-not-inside: esc_url_raw(...)
      - pattern-not-inside: filter_var(...)
      - pattern-not-inside: wp_http_validate_url(...)
    message: |
      Detected SSRF vulnerability in WordPress.
      User input from $_GET, $_POST, or $_REQUEST is directly used in file_get_contents() without sanitization.
      Use wp_http_validate_url() or esc_url() to validate URLs before use.
    metadata:
      category: security
      cwe: "CWE-918: Server-Side Request Forgery (SSRF)"
      owasp: "A10:2021 - Server-Side Request Forgery (SSRF)"
      technology: wordpress
      confidence: HIGH
      references:
        - https://developer.wordpress.org/apis/security/data-validation/
    languages: [php]
    mode: search
    severity: HIGH

